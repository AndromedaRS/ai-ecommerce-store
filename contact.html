<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>ShopEasy</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main>

    <h2>Contact Us</h2>

    <form id="contactForm">

        <input
            type="text"
            id="name"
            placeholder="Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <textarea
            id="message"
            placeholder="Message"
            required
        ></textarea>

        <button type="submit">
            Send
        </button>

        <p id="formMessage"></p>

    </form>

</main>

<footer>
    <p>&copy; 2026 ShopEasy</p>
</footer>

<script src="script.js"></script>

</body>
</html>
